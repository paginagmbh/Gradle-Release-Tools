plugins {
    id 'java-gradle-plugin'
    id 'groovy'
    id 'com.gradle.plugin-publish' version '1.2.1'

    id 'de.paginagmbh.commons.gradle-release-tools' version '0.9.21-SNAPSHOT'
}

repositories {
    mavenLocal()
    mavenCentral()
    gradlePluginPortal()
}

group = "de.paginagmbh.commons"
version = "0.9.21"

gradlePlugin {
    website = 'https://code.pagina.gmbh/paginagmbh/gradle-release-tools'
    vcsUrl = 'https://code.pagina.gmbh/paginagmbh/gradle-release-tools'

    plugins {
        gradleVersionNumberIncrementer {
            id = 'de.paginagmbh.commons.gradle-release-tools'
            implementationClass = 'de.paginagmbh.commons.gradleReleaseTools.GradleReleaseTools'
            displayName = 'Release Tools'
            description = 'Change version numbers and operate git branches'
            tags.set(['gradle', 'meta', 'tool', 'util', 'git'])
        }
    }
}

def artifactory_url = "https://bintray.pagina.gmbh/artifactory"
publishing {
    repositories {
        maven {
            url = "https://bintray.pagina.gmbh/artifactory/" + (version.endsWith('SNAPSHOT') ? "plugins-snapshot-local" : "plugins-release-local")
            name = "PaginaArtifactoryLocalPlugins" + (version.endsWith('SNAPSHOT') ? "Snapshots" : "Released")
            credentials {
                username = System.getenv("ARTIFACTORY_USER")
                password = System.getenv("ARTIFACTORY_PASSWORD")
            }
        }
    }
}
